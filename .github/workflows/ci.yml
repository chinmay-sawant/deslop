name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check docs and action sync
        run: python3 scripts/sync_docs.py --check

      - name: Test
        run: cargo test --locked

      - name: Clippy hygiene
        run: cargo clippy --locked --lib --bins -- -D clippy::unwrap_used -D clippy::expect_used

      - name: Grep hygiene
        run: bash scripts/check_rust_hygiene.sh
